<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday ERUMAAA!! ❤️</title>
    <style>
        body {
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            text-align: center;
            font-family: Arial, sans-serif;
            color: white;
            padding-top: 100px;
        }
        h1 {
            font-size: 50px;
            animation: glow 2s infinite alternate;
        }
        p {
            font-size: 22px;
            margin-top: 20px;
        }
        .heart {
            font-size: 40px;
            animation: beat 1s infinite;
        }
        button {
            margin-top: 30px;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 20px;
            background-color: white;
            color: #ff4e8a;
            cursor: pointer;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px white; }
            to { text-shadow: 0 0 20px yellow; }
        }

        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>Happy Birthday My Erumaa!! 🎂❤️</h1>
    <p>Ne enoda varam erumaaa 💕</p>
    <p>May your day be filled with happiness, love and success ✨</p>

    <div class="heart">❤️ ❤️ ❤️</div>

    <button onclick="showMessage()">Click Me 💌</button>

    <script>
        function showMessage() {
            alert("I Love You So Much ❤️ Happy Birthday Once Again 🎉");
        }
    </script>
<img src="aval.WEBP" alt=center; width="500px">

</body>
</html>
